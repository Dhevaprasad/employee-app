trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: employee-app
  tag: $(Build.BuildId)

steps:
- checkout: self

- script: |
    python3 -m pip install -r requirements.txt
  displayName: Install Dependencies

- script: |
    docker build -t $(imageName):$(tag) .
  displayName: Build Docker Image
