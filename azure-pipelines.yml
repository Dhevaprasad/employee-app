steps:
- checkout: self

- script: |
    python3 -m pip install -r requirements.txt
  displayName: Install Dependencies

- task: Docker@2
  displayName: Build and Push Image
  inputs:
    command: buildAndPush
    containerRegistry: 'ACR-Docker'
    repository: 'employee-app'
    dockerfile: 'Dockerfile'
    tags: |
      $(tag)
      latest